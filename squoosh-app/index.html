<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0d9488" />
    <meta
      name="description"
      content="Pixshrink shrinks PNG, JPEG, WebP, AVIF, GIF and BMP in your browser. Drop your images, drag the quality slider, and download everything as a ZIP. Files never leave your device."
    />
    <meta property="og:title" content="Pixshrink · Local image compressor" />
    <meta property="og:description" content="Shrink PNG, JPEG, WebP, AVIF, GIF and BMP in your browser. Files stay on your device, fully offline." />
    <title>Pixshrink · Local image compressor</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('pixshrink-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full bg-bg text-text antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
