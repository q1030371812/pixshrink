    <script type="application/ld+json">
    {

        {
          "@type": "Question",
          "name": "Is Pixshrink really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, 100% free with no limits. No signup, no payment, no hidden fees."
          }
        },
        {
          "@type": "Question",
          "name": "Do my images get uploaded to a server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Pixshrink runs entirely in your browser using WebAssembly and the Canvas API. Your images never leave your device — this is what makes it private and offline-capable."
          }
        },
        {
          "@type": "Question",
          "name": "What formats does Pixshrink support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PNG, JPEG, WebP, AVIF, GIF, and BMP. You can mix formats in one batch and download everything as a ZIP."
          }
        },
        {
          "@type": "Question",
          "name": "How much can I compress my images?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typically 80-95% file size reduction with minimal visible quality loss, depending on the source image and chosen quality level."
          }
        },
        {
          "@type": "Question",
          "name": "Does Pixshrink work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. After the first load, Pixshrink works without internet. You can install it as a PWA from your browser for offline access anytime."

          "@type": "Question",
          "name": "How is Pixshrink different from TinyPNG or Squoosh?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Like Squoosh, Pixshrink is fully client-side (no upload). Unlike Squoosh, Pixshrink is built for batch compression with a ZIP download workflow. Unlike TinyPNG, your images never touch any server."
          }
        }
      ]
    }

    <!-- Cloudflare Content-Signal hint -->

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('pixshrink-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
