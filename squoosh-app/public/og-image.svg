<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative dots -->
  <g fill="#ffffff" fill-opacity="0.08">
    <circle cx="100" cy="80" r="4"/>
    <circle cx="180" cy="140" r="3"/>
    <circle cx="1100" cy="100" r="5"/>
    <circle cx="1050" cy="200" r="3"/>
    <circle cx="80" cy="540" r="4"/>
    <circle cx="1130" cy="560" r="4"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(120, 180)">
    <rect width="80" height="80" rx="18" fill="#ffffff"/>
    <path d="M20 50 L34 38 L46 46 L60 26" stroke="#0d9488" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="26" r="4" fill="#0d9488"/>
  </g>

  <!-- title -->
  <text x="120" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="#ffffff">Pixshrink</text>

  <!-- tagline -->
  <text x="120" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="#ccfbf1">Shrink images locally. 95% smaller, zero upload.</text>

  <!-- feature pills -->
  <g transform="translate(120, 430)" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="#0f766e">
    <g><rect width="180" height="44" rx="22" fill="#ffffff"/><text x="90" y="29" text-anchor="middle">100% Private</text></g>
    <g transform="translate(200, 0)"><rect width="170" height="44" rx="22" fill="#ffffff"/><text x="85" y="29" text-anchor="middle">No Signup</text></g>
    <g transform="translate(390, 0)"><rect width="200" height="44" rx="22" fill="#ffffff"/><text x="100" y="29" text-anchor="middle">6 formats supported</text></g>
    <g transform="translate(610, 0)"><rect width="180" height="44" rx="22" fill="#ffffff"/><text x="90" y="29" text-anchor="middle">Works Offline</text></g>
  </g>

  <!-- url -->
  <text x="120" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" fill="#ffffff" fill-opacity="0.85">pixshrink.gamechill.org</text>
</svg>